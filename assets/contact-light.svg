<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="214" viewBox="0 0 1280 214" fill="none" role="img" aria-label="Contact — portfolio, GitHub, email; available for senior product and UX roles">
  <title>Contact — portfolio, GitHub, email; available for senior product and UX roles</title>
  <defs><style>
    .ic{fill:none;stroke:#1A1A20;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .idx{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:2px;fill:#6E8BFF}
    .eyebrow{font:500 14px/1 ui-monospace,Menlo,monospace;letter-spacing:5px;fill:#55555E}
    .lead{font:300 30px/1 ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;fill:#1A1A20;letter-spacing:-.5px}
    .sub{font:400 15px/1 ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;fill:#55555E}
    .pill{fill:rgba(0,0,0,0.015);stroke:rgba(0,0,0,0.11);stroke-width:1.2}
    .plbl{font:500 13px/1 ui-monospace,Menlo,monospace;letter-spacing:1px;fill:#1A1A20}
    .foot{font:500 12px/1 ui-monospace,Menlo,monospace;letter-spacing:2px;fill:#55555E}
    .mono{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:3px;fill:#1A1A20}
    .rule{stroke:rgba(0,0,0,0.11);stroke-width:1}
    .draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.3s ease forwards}
    .rev{opacity:0;transform:translateY(10px);animation:rise .7s cubic-bezier(.2,.75,.25,1) forwards}
    .cdot{animation:cdot 2.2s ease-in-out infinite}
    .cring{animation:cring 2.2s ease-out infinite}
    .spin{transform-box:fill-box;transform-origin:center;animation:spin 16s linear infinite}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes rise{to{opacity:1;transform:none}}
    @keyframes cdot{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes cring{0%{r:4px;opacity:.6}100%{r:12px;opacity:0}}
    @keyframes spin{from{transform:rotate(45deg)}to{transform:rotate(405deg)}}
    @media(prefers-reduced-motion:reduce){
      .draw{animation:none;stroke-dashoffset:0}.rev{animation:none;opacity:1;transform:none}
      .cdot,.cring,.spin{animation:none}.spin{transform:rotate(45deg)}
    }
  </style></defs>
