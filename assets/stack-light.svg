<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="392" viewBox="0 0 1280 392" fill="none" role="img" aria-label="Technology and design stack">
  <title>Stack</title>
  <defs><style>
    .tile{fill:rgba(0,0,0,0.015);stroke:rgba(0,0,0,0.11);stroke-width:1.3}
    .ic{fill:none;stroke:#33333B;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .dic{fill:none;stroke:#6E8BFF;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .fic{fill:#33333B;stroke:none}
    .dic-f{fill:#6E8BFF;stroke:none}
    .dot{fill:#43E7C4}
    .lbl{font:500 12px/1 ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;letter-spacing:1.5px;fill:#6B6B76;text-anchor:middle}
    .idx{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:2px;fill:#6E8BFF}
    .eyebrow{font:500 14px/1 ui-monospace,Menlo,monospace;letter-spacing:5px;fill:#6B6B76}
    .rowlbl{font:600 11px/1 ui-monospace,Menlo,monospace;letter-spacing:3px;fill:#9A9AA4}
    .rule{stroke:rgba(0,0,0,0.11);stroke-width:1}
    .chip{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.2,.75,.25,1) forwards}
    .draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.1s ease forwards}
    @keyframes pop{0%{opacity:0;transform:translateY(9px) scale(.92)}100%{opacity:1;transform:none}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @media (prefers-reduced-motion:reduce){.chip{animation:none;opacity:1}.draw{animation:none;stroke-dashoffset:0}}
  </style></defs>

