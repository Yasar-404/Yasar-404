<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="82" viewBox="0 0 1280 82" fill="none" role="img" aria-label="Handcrafted with custom SVG. No templates, no external icons. 2026, Chennai.">
  <title>Handcrafted with custom SVG. No templates, no external icons. 2026, Chennai.</title>
  <defs><style>
    .foot{font:500 12px/1 ui-monospace,Menlo,monospace;letter-spacing:2px;fill:#9A9AA4}
    .mono{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:3px;fill:#EDEDF0}
    .rule{stroke:rgba(255,255,255,0.13);stroke-width:1}
    .draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.4s ease forwards}
    .rev{opacity:0;animation:fin .8s ease .3s forwards}
    @keyframes draw{to{stroke-dashoffset:0}} @keyframes fin{to{opacity:1}}
    @media(prefers-reduced-motion:reduce){.draw{animation:none;stroke-dashoffset:0}.rev{animation:none;opacity:1}}
  </style></defs>
  <line class="rule draw" x1="40" y1="1" x2="1240" y2="1" pathLength="1"/>
  <g class="rev">
    <path d="M45,44 l6,6 -6,6 -6,-6 Z" fill="#6E8BFF"/>
    <text class="mono" x="64" y="55">YASAR K</text>
    <text class="foot" x="640" y="55" text-anchor="middle">HANDCRAFTED WITH CUSTOM SVG &#160;·&#160; NO TEMPLATES &#160;·&#160; NO EXTERNAL ICONS</text>
    <text class="foot" x="1240" y="55" text-anchor="end">© 2026 &#160;·&#160; CHENNAI, IN</text>
  </g>
</svg>
