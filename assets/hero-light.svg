  <!-- aurora thread + travelling pulse + echo -->
  <g filter="url(#glow)">
    <line x1="82" y1="266" x2="712.9" y2="266" stroke="url(#aurora)" stroke-width="2" stroke-linecap="round"
          stroke-dasharray="630.9" stroke-dashoffset="630.9">
      <animate attributeName="stroke-dashoffset" from="630.9" to="0" dur="1.6s" begin="1.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </line>
    <circle r="3.6" fill="#FFFFFF">
      <animate attributeName="cx" values="82;712.9;82" dur="7s" begin="3.5s" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="7s" begin="3.5s" keyTimes="0;0.05;0.5;0.95;1" repeatCount="indefinite"/>
    </circle>
    <circle r="2.2" fill="#43E7C4">
      <animate attributeName="cx" values="82;712.9;82" dur="7s" begin="4.4s" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.7;.7;.7;0" dur="7s" begin="4.4s" keyTimes="0;0.05;0.5;0.95;1" repeatCount="indefinite"/>
    </circle>
  </g>

  <text class="role fade" x="82" y="306">Where product thinking meets engineering excellence.</text>

  <g transform="translate(82,338)" class="fade">
    <circle cx="4" cy="-4" r="4" fill="#43E7C4"><animate attributeName="opacity" values="1;.35;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="4" cy="-4" r="4" fill="none" stroke="#43E7C4" stroke-width="1.4">
      <animate attributeName="r" values="4;11" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".6;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text class="status" x="20" y="0">OPEN TO DESIGN / ENGINEERING ROLES</text>
  </g>
</svg>
