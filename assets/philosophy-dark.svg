<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="292" viewBox="0 0 1280 292" fill="none" role="img" aria-label="Engineering philosophy">
  <defs><style>
    .ic{fill:none;stroke:#EDEDF0;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .aic{fill:none;stroke:#6E8BFF;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .fic{fill:#EDEDF0} .dot{fill:#43E7C4} .adot{fill:#6E8BFF}
    .idx{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:2px;fill:#6E8BFF}
    .eyebrow{font:500 14px/1 ui-monospace,Menlo,monospace;letter-spacing:5px;fill:#9A9AA4}
    .meta{font:500 11px/1 ui-monospace,Menlo,monospace;letter-spacing:3px;fill:#5B5B63}
    .lead{font:300 30px/1 ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;fill:#EDEDF0;letter-spacing:-.5px}
    .num{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:1px;fill:#5B5B63}
    .ptitle{font:600 18px/1 ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;fill:#EDEDF0}
    .pdesc{font:400 13.5px/1.5 ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;fill:#9A9AA4}
    .ftitle{font:500 17px/1 ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;fill:#EDEDF0}
    .fdesc{font:400 13.5px/1 ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;fill:#9A9AA4}
    .tag{font:500 11px/1 ui-monospace,Menlo,monospace;letter-spacing:2px;fill:#5B5B63}
    .rule{stroke:rgba(255,255,255,0.12);stroke-width:1}
    .draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.3s ease forwards}
    .rev{opacity:0;transform:translateY(10px);animation:rise .7s cubic-bezier(.2,.75,.25,1) forwards}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes rise{to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.draw{animation:none;stroke-dashoffset:0}.rev{animation:none;opacity:1;transform:none}}
  </style></defs>
  <text class="idx" x="40" y="46">03</text><line class="rule draw" x1="66" y1="42" x2="120" y2="42" pathLength="1"/><text class="eyebrow" x="134" y="47">PHILOSOPHY</text><text class="lead rev" x="40" y="108" style="animation-delay:.25s">I design in the medium I ship in.</text><g class="rev" style="animation-delay:0.50s"><line class="rule draw" x1="40" y1="152" x2="414" y2="152" pathLength="1" style="animation-delay:0.50s"/><g transform="translate(54,178)"><path class="ic" d="M-9,0 l-6,6 6,6"/><path class="ic" d="M9,0 l6,6 -6,6"/><path class="aic" d="M4,-2 l-8,16"/></g><text class="num" x="414" y="180" text-anchor="end">01</text><text class="ptitle" x="40" y="214">Design in code</text><text class="pdesc" x="40" y="240">The prototype and the shipped product</text><text class="pdesc" x="40" y="259">share one source of truth.</text></g><g class="rev" style="animation-delay:0.64s"><line class="rule draw" x1="453" y1="152" x2="827" y2="152" pathLength="1" style="animation-delay:0.64s"/><g transform="translate(467,178)"><path class="ic" d="M-10,2 v12"/><path class="ic" d="M10,2 v12"/><path class="ic" d="M-10,8 h20"/><circle cx="0" cy="8" r="2.4" class="dot"/></g><text class="num" x="827" y="180" text-anchor="end">02</text><text class="ptitle" x="453" y="214">Details are the interface</text><text class="pdesc" x="453" y="240">Easing, spacing, and motion aren't</text><text class="pdesc" x="453" y="259">decoration — they're the product.</text></g><g class="rev" style="animation-delay:0.78s"><line class="rule draw" x1="866" y1="152" x2="1240" y2="152" pathLength="1" style="animation-delay:0.78s"/><g transform="translate(880,178)"><path class="aic" d="M-11,12 a11,11 0 0 1 22,0"/><path class="ic" d="M0,12 l7,-8"/><circle cx="0" cy="12" r="2.2" class="fic"/></g><text class="num" x="1240" y="180" text-anchor="end">03</text><text class="ptitle" x="866" y="214">Accessible &amp; fast by default</text><text class="pdesc" x="866" y="240">Semantics, contrast, and reduced-</text><text class="pdesc" x="866" y="259">motion are requirements, not a pass.</text></g>
</svg>
